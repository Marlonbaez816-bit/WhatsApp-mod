<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Airdrop-Mod</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AirdropMod">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="airdrop-target" class="hidden">
        <div class="airdrop-modal">
            <div class="airdrop-ring">
                <div class="inner-icon">A</div>
            </div>
            <div class="airdrop-text">
                <strong id="sender-name">iPhone de Marlon</strong>
                <span id="status-text">Recibiendo mensaje...</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="status-bar-spacer"></div>
            <div class="header-content">
                <h1>Chats</h1>
                <div class="header-icons">
                    <span>📸</span>
                    <span>➕</span>
                </div>
            </div>
            <div class="search-container">
                <input type="text" placeholder="Buscar" class="search-input">
            </div>
        </header>

        <main class="chat-list">
            <div class="chat-item" onclick="reproducirEstado()">
                <div class="avatar-container status-active">
                    <div class="avatar-placeholder">M</div>
                </div>
                <div class="chat-info">
                    <div class="chat-top">
                        <span class="user-name">Estado con Audio</span>
                        <span class="time">ahora</span>
                    </div>
                    <p class="last-msg">Toca para probar audio y vibración</p>
                </div>
            </div>
        </main>

        <footer class="test-panel">
            <button class="btn-action receive" onclick="triggerRecibir()">Simular Choque (In)</button>
            <button class="btn-action send" onclick="triggerEnviar()">Efecto AirDrop (Out)</button>
        </footer>
    </div>

    <audio id="haptic-audio" src="audio.mp3"></audio>

    <script src="app.js"></script>
</body>
    </html>
